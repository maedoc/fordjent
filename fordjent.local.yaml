server:
  host: "0.0.0.0"
  port: 8080

webhook:
  secret: "REDACTED"

forgejo:
  url: "http://forgejo-local:3000"
  token: "${FORGEJO_TOKEN}"
  admin_token: "${FORGEJO_ADMIN_TOKEN}"
  rate_limit: 60

agent:
  max_sessions: 25
  idle_timeout: "4h"
  workdir: "/var/lib/fordjent/work"
  max_turns: 75
  max_turns_pm: 15
  max_turns_implementer: 50
  max_turns_reviewer: 20
  role_providers:
    pm: "wafer-glm"
    reviewer: "wafer-glm"
    implementer: "wafer-qwen"
    tester: "wafer-qwen"
    devops: "wafer-qwen"
  fallback_provider: "wafer-qwen"
  commit_prefix: "[agent-automation]"
  context_window: 131072
  compaction_threshold: 0.85
  compaction_keep_turns: 8
  enable_lifecycle: true
  enable_stale_gate: true
  enable_scaffold_detection: true
  enable_session_recovery: true
  enable_context_injection: true
  enable_auto_collaborator: true
  enable_auto_retry: true
  max_session_retries: 2
  auto_retry_delay: "5m"
  require_role_tag: true
  session_timeout: "60m"
  git_name: "Fordjent Dev Agent"
  git_email: "fordjent-dev@forgejo.local"

budget:
  enabled: true
  max_session_cost: 2.00
  max_monthly_cost: 50.00

sandbox:
  enabled: true
  backend: bwrap
  tmpfs_size_mb: 64
  keep_profiles_on_failure: true
  violation_comment_threshold: 3
  allowed_write_dirs: []

providers:
  - name: "wafer-qwen"
    api_base: "https://pass.wafer.ai/v1"
    api_key: "${WAFER_API_KEY}"
    model: "Qwen3.5-397B-A17B"
    max_tokens: 32768
    request_timeout: "90s"
    max_retries: 5
    retry_base_delay: "3s"
    retry_max_delay: "60s"
    max_concurrent_llm_calls: 3
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0
  - name: "wafer-glm"
    api_base: "https://pass.wafer.ai/v1"
    api_key: "${WAFER_API_KEY}"
    model: "GLM-5.1"
    max_tokens: 32768
    request_timeout: "120s"
    max_retries: 5
    retry_base_delay: "3s"
    retry_max_delay: "60s"
    max_concurrent_llm_calls: 3
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0

events:
  - "issues"
  - "issue_comment"
  - "pull_request"
  - "pull_request_review_comment"

session_key_template: "{{.Repository}}/issues/{{.IssueNumber}}"

security:
  protected_branches: ["main", "master"]
  require_pr_for_workflows: true
  filter_agent_events: true

memory:
  enabled: true
  compaction_cron: "0 2 * * *"
  compaction_path: "docs/issues"

database:
  path: ""

scanner:
  enabled: true
  interval: "5m"
  repo: "fjadmin/testbed"

log_level: "info"
