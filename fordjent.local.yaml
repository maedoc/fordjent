server:
  host: "0.0.0.0"
  port: 8080

webhook:
  secret: "REDACTED"

forgejo:
  url: "http://forgejo-local:3000"
  token: "${FORGEJO_TOKEN}"
  rate_limit: 60

telegram:
  enabled: false

agent:
  max_sessions: 25
  idle_timeout: "4h"
  workdir: "/var/lib/fordjent/work"
  max_turns: 75
  max_turns_pm: 15
  max_turns_implementer: 50
  role_providers:
    pm: "kimi-k2.6"
    reviewer: "glm-5.1"
    implementer: "ollama-cloud"
  commit_prefix: "[agent-automation]"
  context_window: 131072
  compaction_threshold: 0.85
  compaction_keep_turns: 8
  enable_lifecycle: true
  enable_stale_gate: true
  enable_scaffold_detection: true
  enable_session_recovery: true
  enable_context_injection: true
  enable_auto_collaborator: true
  session_timeout: "30m"

budget:
  enabled: true
  max_session_cost: 2.00
  max_monthly_cost: 50.00

providers:
  - name: "ollama-cloud"
    api_base: "https://ollama.com/v1"
    api_key: "${OLLAMA_API_KEY}"
    model: "${OLLAMA_MODEL}"
    max_tokens: 8192
    request_timeout: "120s"
    max_retries: 3
    retry_base_delay: "2s"
    retry_max_delay: "30s"
    max_concurrent_llm_calls: 3
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0
  - name: "kimi-k2.6"
    api_base: "https://ollama.com/v1"
    api_key: "${OLLAMA_API_KEY}"
    model: "kimi-k2.6"
    max_tokens: 16384
    request_timeout: "120s"
    max_retries: 3
    retry_base_delay: "2s"
    retry_max_delay: "30s"
    max_concurrent_llm_calls: 2
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0
  - name: "glm-5.1"
    api_base: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "${GLM_API_KEY}"
    model: "glm-5.1"
    max_tokens: 16384
    request_timeout: "180s"
    max_retries: 3
    retry_base_delay: "5s"
    retry_max_delay: "60s"
    max_concurrent_llm_calls: 2
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0

events:
  - "issues"
  - "issue_comment"
  - "pull_request"
  - "pull_request_review_comment"

session_key_template: "{{.Repository}}/issues/{{.IssueNumber}}"

security:
  protected_branches: ["main", "master"]
  require_pr_for_workflows: true
  filter_agent_events: true

memory:
  enabled: true
  compaction_cron: "0 2 * * *"
  compaction_path: "docs/issues"

database:
  path: ""

log_level: "info"
