server:
  host: "0.0.0.0"
  port: 8080

webhook:
  secret: "REDACTED"

forgejo:
  url: "http://forgejo-local:3000"
  token: "${FORGEJO_TOKEN}"
  rate_limit: 60

telegram:
  enabled: false

agent:
  max_sessions: 25
  idle_timeout: "4h"
  workdir: "/var/lib/fordjent/work"
  max_turns: 75
  commit_prefix: "[agent-automation]"
  context_window: 128000
  compaction_threshold: 0.80
  compaction_keep_turns: 8
  enable_lifecycle: true
  enable_stale_gate: true
  enable_scaffold_detection: true

budget:
  enabled: false
  max_session_cost: 0.50
  max_monthly_cost: 10.00

providers:
  - name: "ollama-cloud"
    api_base: "https://ollama.com/v1"
    api_key: "${OLLAMA_API_KEY}"
    model: "${OLLAMA_MODEL}"
    max_tokens: 8192
    request_timeout: "120s"
    max_retries: 3
    retry_base_delay: "2s"
    retry_max_delay: "30s"
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0

events:
  - "issues"
  - "issue_comment"
  - "pull_request"
  - "pull_request_review_comment"

session_key_template: "{{.Repository}}/issues/{{.IssueNumber}}"

security:
  protected_branches: ["main", "master"]
  require_pr_for_workflows: true
  filter_agent_events: true

memory:
  enabled: true
  compaction_cron: "0 2 * * *"
  compaction_path: "docs/issues"

database:
  path: ""

log_level: "info"
