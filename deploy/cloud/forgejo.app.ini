; Forgejo app.ini for cloud deployment
; Templated by deploy script — DO NOT edit manually

APP_NAME = Forgejo
RUN_MODE = prod

[server]
DOMAIN = {{FORGEJO_DOMAIN}}
ROOT_URL = https://{{FORGEJO_DOMAIN}}/
HTTP_PORT = 3000
SSH_DOMAIN = {{FORGEJO_DOMAIN}}
SSH_PORT = 22
DISABLE_SSH = false
LFS_START_SERVER = true
LANDING_PAGE = explore

[database]
DB_TYPE = sqlite3
PATH = /data/gitea/gitea.db

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = false
SHOW_REGISTRATION_BUTTON = false

[webhook]
ALLOWED_HOST_LIST = *
QUEUE_LENGTH = 1000
DELIVER_TIMEOUT = 30

[repository]
DEFAULT_PRIVATE = public
DEFAULT_BRANCH = main

[security]
INSTALL_LOCK = true

[log]
MODE = file
LEVEL = Info
ROOT_PATH = /data/gitea/log

[mailer]
ENABLED = false

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[session]
PROVIDER = memory

[cache]
ADAPTER = memory

[packages]
ENABLED = false

[actions]
ENABLED = false

[ui]
DEFAULT_THEME = forgejo-dark