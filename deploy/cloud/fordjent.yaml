# Fordjent cloud configuration
# Templated by deploy script — DO NOT edit manually

server:
  host: "0.0.0.0"
  port: 8080

webhook:
  secret: "{{WEBHOOK_SECRET}}"

forgejo:
  url: "http://forgejo:3000"
  token: "{{FORGEJO_TOKEN}}"
  admin_token: "{{FORGEJO_ADMIN_TOKEN}}"
  rate_limit: 60

agent:
  max_sessions: 25
  idle_timeout: "4h"
  workdir: "/var/lib/fordjent/work"
  max_turns: 75
  max_turns_pm: 15
  max_turns_implementer: 50
  max_turns_reviewer: 20
  role_providers:
    pm: "scaleway-devstral"
    reviewer: "scaleway-devstral"
    implementer: "scaleway-qwen"
    tester: "scaleway-qwen"
    devops: "scaleway-qwen"
  fallback_provider: "scaleway-qwen"
  commit_prefix: "[agent-automation]"
  context_window: 131072
  compaction_threshold: 0.85
  compaction_keep_turns: 8
  enable_lifecycle: true
  enable_stale_gate: true
  enable_scaffold_detection: true
  enable_session_recovery: true
  enable_context_injection: true
  enable_auto_collaborator: true
  enable_auto_retry: true
  max_session_retries: 2
  auto_retry_delay: "5m"
  require_role_tag: true
  session_timeout: "60m"
  git_name: "Fordjent Agent"
  git_email: "fordjent@wdmn.fr"

budget:
  enabled: true
  max_session_cost: 2.00
  max_monthly_cost: 50.00

sandbox:
  enabled: false
  backend: auto
  tmpfs_size_mb: 64
  keep_profiles_on_failure: true
  violation_comment_threshold: 3
  allowed_write_dirs: []

providers:
  - name: "scaleway-qwen"
    api_base: "https://api.scaleway.ai/7e3db0d1-34c9-4398-8bf5-208bf15fbf05/v1"
    api_key: "{{SCALEWAY_AI_KEY}}"
    model: "qwen3.6-35b-a3b"
    max_tokens: 32768
    request_timeout: "90s"
    max_retries: 5
    retry_base_delay: "3s"
    retry_max_delay: "60s"
    max_concurrent_llm_calls: 3
    cost_per_1m_input_tokens: 0
    cost_per_1m_output_tokens: 0
  - name: "scaleway-devstral"
    api_base: "https://api.scaleway.ai/7e3db0d1-34c9-4398-8bf5-208bf15fbf05/v1"
    api_key: "{{SCALEWAY_AI_KEY}}"
    model: "devstral-2-123b-instruct-2512"
    max_tokens: 16384
    request_timeout: "120s"
    max_retries: 5
    retry_base_delay: "3s"
    retry_max_delay: "60s"
    max_concurrent_llm_calls: 2
    cost_per_1m_input_tokens: 0.40
    cost_per_1m_output_tokens: 2.00

events:
  - "issues"
  - "issue_comment"
  - "pull_request"
  - "pull_request_review_comment"

session_key_template: "{{.Repository}}/issues/{{.IssueNumber}}"

security:
  protected_branches: ["main", "master"]
  require_pr_for_workflows: true
  filter_agent_events: true

memory:
  enabled: true
  compaction_cron: "0 2 * * *"
  compaction_path: "docs/issues"

database:
  path: ""

scanner:
  enabled: true
  interval: "5m"
  repo: "{{ADMIN_USER}}/{{TEST_REPO}}"

auto_register:
  enabled: true
  webhook_url: "https://fordjent.wdmn.fr/acp/v1/events"

log_level: "{{LOG_LEVEL}}"